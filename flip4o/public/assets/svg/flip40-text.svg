<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 110" width="448" height="110" role="img" aria-label="FLIP40">
  <defs>
    <filter id="glow-wm" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feGaussianBlur stdDeviation="24" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="448" height="110" fill="none"/>

  <!-- FLIP (from wordmark.svg) -->
  <g filter="url(#glow-wm)">
    <rect x="10" y="10" width="13" height="90" fill="#c8ff00"/>
    <rect x="10" y="10" width="62" height="15" fill="#c8ff00"/>
    <rect x="10" y="50" width="46" height="13" fill="#c8ff00"/>
    <rect x="14" y="30" width="7" height="4" fill="#080808" opacity="0.55"/>
    <rect x="22" y="64" width="5" height="3" fill="#080808" opacity="0.45"/>

    <rect x="88" y="10" width="13" height="90" fill="#c8ff00"/>
    <rect x="88" y="85" width="58" height="15" fill="#c8ff00"/>
    <rect x="92" y="48" width="6" height="5" fill="#080808" opacity="0.5"/>

    <rect x="162" y="10" width="13" height="90" fill="#c8ff00"/>
    <rect x="164" y="35" width="7" height="4" fill="#080808" opacity="0.55"/>

    <rect x="192" y="10" width="13" height="90" fill="#c8ff00"/>
    <rect x="192" y="10" width="58" height="14" fill="#c8ff00"/>
    <rect x="242" y="10" width="13" height="46" fill="#c8ff00"/>
    <rect x="192" y="46" width="63" height="14" fill="#c8ff00"/>
    <rect x="205" y="24" width="37" height="22" fill="#080808"/>
    <rect x="197" y="78" width="6" height="5" fill="#080808" opacity="0.5"/>
  </g>

  <!-- 40 (block digits, matching FLIP weight) -->
  <g filter="url(#glow-wm)">
    <polygon points="275,10 288,10 340,52 327,52 275,52" fill="#c8ff00"/>
    <rect x="275" y="52" width="65" height="13" fill="#c8ff00"/>
    <rect x="327" y="52" width="13" height="48" fill="#c8ff00"/>
    <rect x="314" y="78" width="6" height="5" fill="#080808" opacity="0.5"/>

    <rect x="365" y="10" width="13" height="90" fill="#c8ff00"/>
    <rect x="418" y="10" width="13" height="90" fill="#c8ff00"/>
    <rect x="365" y="10" width="66" height="13" fill="#c8ff00"/>
    <rect x="365" y="87" width="66" height="13" fill="#c8ff00"/>
    <rect x="378" y="48" width="6" height="5" fill="#080808" opacity="0.45"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="FLIP40.COM Icon">
  <defs>
    <filter id="glow-lime-icon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="violet-offset-icon" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="-4" dy="4" result="offset"/>
      <feFlood flood-color="#9b5cf6" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" fill="#080808"/>

  <!-- Outer hexagon/chamfered container -->
  <polygon points="20,60 40,20 160,20 180,60 180,140 160,180 40,180 20,140"
           fill="none" stroke="#1f1f1f" stroke-width="1.5"/>

  <!-- Double flip arrows centered -->
  <g filter="url(#violet-offset-icon)">
    <!-- Arrow pointing RIGHT -->
    <polyline points="30,88 130,88 130,70 170,100 130,130 130,112 30,112"
              fill="none" stroke="#c8ff00" stroke-width="6"
              stroke-linejoin="miter" stroke-linecap="square"/>
  </g>

  <g filter="url(#violet-offset-icon)" transform="rotate(180, 100, 100)">
    <!-- Arrow pointing LEFT (mirrored) -->
    <polyline points="30,88 130,88 130,70 170,100 130,130 130,112 30,112"
              fill="none" stroke="#c8ff00" stroke-width="6"
              stroke-linejoin="miter" stroke-linecap="square"/>
  </g>

  <!-- 4-pointed star accent -->
  <path d="M170,170 L172,165 L177,163 L172,161 L170,156 L168,161 L163,163 L168,165 Z"
        fill="#888888" opacity="0.6"/>
</svg>
